name: E2E K8S SDK Tests

on:
  push:
    branches:
      - master
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}

permissions: read-all

env:
  GO_VERSION: '1.25.0'
  KIND_VERSION: 'v0.22.0'
  KIND_IMAGE: 'kindest/node:v1.32.0'
  KIND_CLUSTER_NAME: 'ci-testing'


jobs:
  # ============================================================
  # SDK CRUD Tests (Go / Java / Python)
  # ============================================================
  sdk-e2e:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sdk: [go, java, python]
    name: K8S SDK E2E (${{ matrix.sdk }})
    steps:
      - name: Checkout agents-api
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        if: matrix.sdk == 'go'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Java
        if: matrix.sdk == 'java'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Python
        if: matrix.sdk == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Setup Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: ${{ env.KIND_IMAGE }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: ./test/kind-conf.yaml
          version: ${{ env.KIND_VERSION }}

      - name: Install CRDs
        run: kubectl apply -f agents/crds/

      - name: Run SDK E2E Test
        run: |
          chmod +x hack/run-k8s-sdk-e2e-test.sh
          hack/run-k8s-sdk-e2e-test.sh --sdk ${{ matrix.sdk }}


